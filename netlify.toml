[build]
  command = "php artisan config:cache && php artisan route:cache && php artisan view:cache"
  publish = "public"

[build.environment]
  PHP_VERSION = "8.2"

[[plugins]]
  package = "@netlify/plugin-lighthouse"

[context.production.environment]
  APP_ENV = "production"
  APP_DEBUG = "false"

[[redirects]]
  from = "/api/*"
  to = "/.netlify/functions/:splat"
  status = 200

[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
  force = false
